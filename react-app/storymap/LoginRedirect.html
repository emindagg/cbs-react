<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yapılıyor...</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .loader-container {
            text-align: center;
            padding: 48px 64px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 2px solid #e5e5ea;
            border-top-color: #0071e3;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1d1d1f;
            letter-spacing: -0.02em;
            margin: 0 0 8px;
        }

        p {
            font-size: 15px;
            color: #86868b;
            margin: 0;
        }

        .error-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            color: #1d1d1f;
            padding: 32px 40px;
            border-radius: 20px;
            max-width: 420px;
            margin: 0 auto;
            display: none;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 59, 48, 0.2);
        }

        .error-box h3 {
            margin: 0 0 12px;
            font-weight: 600;
            font-size: 20px;
            color: #ff3b30;
        }

        .error-box p { color: #86868b; }

        .error-box button {
            background: #ff3b30;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: 500;
            font-size: 15px;
            transition: opacity 0.2s ease;
        }

        .error-box button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="loader-container" id="loader">
        <div class="spinner"></div>
        <h2>Giriş yapılıyor...</h2>
        <p>Lütfen bekleyin</p>
    </div>

    <div class="error-box" id="error-box">
        <h3>Giriş Başarısız</h3>
        <p id="error-message"></p>
        <button onclick="window.location.href='index.html'">Ana Sayfaya Dön</button>
    </div>

    <script type="module" src="src/loginRedirectMain.js"></script>
</body>
</html>
