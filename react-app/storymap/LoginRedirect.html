<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yapılıyor...</title>
    <link rel="stylesheet" href="./src/styles/components/loading-overlay.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #F7F5F2;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .error-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            color: #1d1d1f;
            padding: 32px 40px;
            border-radius: 20px;
            max-width: 420px;
            margin: 0 auto;
            display: none;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 59, 48, 0.2);
            text-align: center;
        }

        .error-box h3 {
            margin: 0 0 12px;
            font-weight: 600;
            font-size: 20px;
            color: #ff3b30;
        }

        .error-box p {
            color: #86868b;
        }

        .error-box button {
            background: #ff3b30;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: 500;
            font-size: 15px;
            transition: opacity 0.2s ease;
        }

        .error-box button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner">
                <div class="loading-spinner__dot"></div>
                <div class="loading-spinner__dot"></div>
                <div class="loading-spinner__dot"></div>
                <div class="loading-spinner__dot"></div>
            </div>
            <h2>Giriş yapılıyor</h2>
            <p>Lütfen bekleyin</p>
        </div>
    </div>

    <div class="error-box" id="error-box">
        <h3>Giriş Başarısız</h3>
        <p id="error-message"></p>
        <button onclick="window.location.href='index.html'">Ana Sayfaya Dön</button>
    </div>

    <script type="module" src="src/loginRedirectMain.js"></script>
</body>
</html>
